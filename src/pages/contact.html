<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support - .rbg</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo">.rbg</div>
    <div class="search-bar">
      <i class="fa-solid fa-magnifying-glass text-muted"></i>
      <input type="text" placeholder="Search help center...">
    </div>
    <div class="nav-links">
      <a href="../index.html">Dashboard</a>
      <a href="about.html">Directory</a>
      <a href="contact.html" class="text-primary font-bold">Support</a>
      <button class="btn btn-primary" style="padding: 0.35rem 1rem;">Buy Tokens</button>
      <div class="profile-icon" style="width: 32px; height: 32px; background-color: #E5E7EB; border-radius: 50%; display: flex; align-items: center; justify-content: center;"><i class="fa-solid fa-user text-muted"></i></div>
    </div>
  </nav>

  <div class="dashboard-container">
    <div class="card" style="padding: 3rem; max-width: 600px; margin: 0 auto;">
        <h1 class="font-bold text-primary" style="font-size: 2rem; margin-bottom: 1rem;">Contact Support</h1>
        <p style="margin-bottom: 2rem;">Having trouble with your subscription or token purchases? Reach out to our 24/7 team.</p>
        
        <form style="display: flex; flex-direction: column; gap: 1rem;">
            <div>
                <label class="font-bold text-muted" style="font-size: 0.875rem;">Email Address</label>
                <input type="email" style="width: 100%; padding: 0.75rem; border: 1px solid #E5E7EB; border-radius: 8px; margin-top: 0.5rem;" placeholder="name@company.com">
            </div>
            <div>
                <label class="font-bold text-muted" style="font-size: 0.875rem;">How can we help?</label>
                <textarea style="width: 100%; padding: 0.75rem; border: 1px solid #E5E7EB; border-radius: 8px; margin-top: 0.5rem; min-height: 120px;" placeholder="Describe your issue..."></textarea>
            </div>
            <button type="button" class="btn btn-primary" style="align-self: flex-start;">Send Message</button>
        </form>
    </div>
  </div>
</body>
</html>
